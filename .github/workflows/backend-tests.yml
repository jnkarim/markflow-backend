name: Backend tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DJANGO_SECRET_KEY: markflow-ci-secret-key-with-more-than-thirty-two-bytes
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare static directory
        run: mkdir -p staticfiles

      - name: Run Django checks
        run: python manage.py check

      - name: Verify migrations are committed
        run: python manage.py makemigrations --check --dry-run

      - name: Run backend test suite
        run: python manage.py test apps.accounts apps.tasks apps.annotations
